<line x1="412" y1="248" x2="430" y2="248" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="590" y1="248" x2="608" y2="248" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="676" y1="268" x2="676" y2="290" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="510" y1="268" x2="502" y2="290" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="600" y1="318" x2="502" y2="318" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
