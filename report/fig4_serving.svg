<line x1="176" y1="516" x2="196" y2="516" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="372" y1="516" x2="390" y2="516" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="682" y1="538" x2="682" y2="556" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="600" y1="556" x2="582" y2="578" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
<line x1="166" y1="600" x2="166" y2="620" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="296" y1="648" x2="312" y2="648" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="524" y1="648" x2="540" y2="648" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="486" y1="600" x2="486" y2="620" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
</svg>
