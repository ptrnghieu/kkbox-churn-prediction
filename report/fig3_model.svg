<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700" font-family="Arial, Helvetica, sans-serif" style="background:#fff">
<defs>
  <marker id="arr" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#2a2a2a"/>
  </marker>
  <marker id="arr-lt" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#888888"/>
  </marker>
  <marker id="arr-blue" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#1565c0"/>
  </marker>
</defs><text x="390" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#111111">Model Pipeline — Detailed Architecture</text>
<text x="390" y="42" text-anchor="middle" font-size="10" font-weight="normal" fill="#555555">XGBoost Training with Out-of-Time Validation · MLflow Tracking · GCS Artifact Upload</text>
<rect x="20" y="52" width="740" height="60" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="65" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Data Source</text>
<rect x="36" y="68" width="352" height="36" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="212" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">BigQuery  kkbox_gold.features_train</text>
<text x="212" y="95" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">~1,082,190 rows  ·  18 features  ·  is_churn label  ·  churn rate ≈ 10%</text>
<rect x="404" y="68" width="340" height="36" rx="5" fill="#f3f3f3" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="574" y="82" text-anchor="middle" font-size="9" font-weight="normal" fill="#333" font-family="Courier New, Courier, monospace">pandas_gbq.read_gbq(BQ_TABLE, project_id)</text>
<text x="574" y="95" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">→ pd.DataFrame  (all 18 feature cols + target + metadata)</text>
<rect x="20" y="130" width="740" height="120" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="143" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Data Preprocessing</text>
<rect x="36" y="148" width="200" height="90" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="136" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Numeric Features</text>
<text x="136" y="179" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">fillna(0)  for NUM_COLS</text>
<text x="136" y="193" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">14 cols: total_secs,</text>
<text x="136" y="205" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">cancel_count, etc.</text>
<text x="136" y="217" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">medians computed here</text>
<rect x="252" y="148" width="200" height="90" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="352" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Categorical Features</text>
<text x="352" y="179" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">gender → {male:0, female:1,</text>
<text x="352" y="191" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">          unknown:2}</text>
<text x="352" y="205" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">bd → fillna(bd_median)</text>
<text x="352" y="217" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">city → fillna(city_mode)</text>
<rect x="468" y="148" width="276" height="90" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" opacity="1"/>
<text x="606" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">preprocessing_config.json</text>
<text x="606" y="179" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">num_cols_medians: {col: median}</text>
<text x="606" y="191" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">bd_median, city_mode,</text>
<text x="606" y="203" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">registered_via_mode,</text>
<text x="606" y="215" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">gender_map: {male:0, ...}</text>
<text x="606" y="227" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">→ saved to GCS for serving</text>
<rect x="20" y="268" width="740" height="84" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="281" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Out-of-Time Train / Test Split</text>
<rect x="36" y="284" width="348" height="56" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="210" y="299" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Train Set  (~804k rows)</text>
<text x="210" y="313" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">registration_init_time &lt; 2016-06-01</text>
<text x="210" y="327" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">churn rate ≈ 10%  ·  features + is_churn</text>
<rect x="400" y="284" width="344" height="56" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="572" y="299" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Test Set  (~157k rows)</text>
<text x="572" y="313" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">registration_init_time ≥ 2016-06-01</text>
<text x="572" y="327" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">churn rate ≈ 10%  ·  held-out, no leakage</text>
<rect x="20" y="370" width="740" height="120" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="383" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">XGBoost Training  (model.fit)</text>
<rect x="36" y="388" width="220" height="90" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="146" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Hyperparameters</text>
<text x="146" y="418" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">n_estimators=500</text>
<text x="146" y="430" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">max_depth=6  ·  lr=0.05</text>
<text x="146" y="442" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">subsample=0.8  ·  colsample=0.8</text>
<text x="146" y="454" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">min_child_weight=10</text>
<text x="146" y="466" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">early_stopping_rounds=30</text>
<rect x="272" y="388" width="220" height="90" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" opacity="1"/>
<text x="382" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Class Imbalance Handling</text>
<text x="382" y="418" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">scale_pos_weight =</text>
<text x="382" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="#bf360c" font-family="Courier New, Courier, monospace">  |neg| / |pos| ≈ 9.0</text>
<text x="382" y="444" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">eval_metric = AUC</text>
<text x="382" y="456" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">eval_set = [(X_test, y_test)]</text>
<text x="382" y="468" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">verbose every 50 rounds</text>
<rect x="508" y="388" width="236" height="90" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="626" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Threshold Optimization</text>
<text x="626" y="418" text-anchor="middle" font-size="9" font-weight="normal" fill="#333">τ̂ = argmax_τ  F₁(τ)</text>
<text x="626" y="432" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">PR curve → best_idx</text>
<text x="626" y="444" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">best_threshold = 0.789</text>
<text x="626" y="456" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">serving default = 0.781</text>
<text x="626" y="468" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">override via CHURN_THRESHOLD</text>
<rect x="20" y="508" width="740" height="64" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="521" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Evaluation Metrics  (on Test Set)</text>
<rect x="36" y="524" width="104" height="36" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" opacity="1"/>
<text x="88" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">AUC-ROC</text>
<text x="88" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">0.8924</text>
<rect x="152" y="524" width="104" height="36" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" opacity="1"/>
<text x="204" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">AUC-PR</text>
<text x="204" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">0.5044</text>
<rect x="268" y="524" width="104" height="36" rx="5" fill="#f2f2f2" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="320" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">F1-Score</text>
<text x="320" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">0.5068</text>
<rect x="384" y="524" width="104" height="36" rx="5" fill="#f2f2f2" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="436" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">Precision</text>
<text x="436" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">0.3593</text>
<rect x="500" y="524" width="104" height="36" rx="5" fill="#f2f2f2" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="552" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">Recall</text>
<text x="552" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">0.8596</text>
<rect x="616" y="524" width="128" height="36" rx="5" fill="#f2f2f2" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="680" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">Log Loss</text>
<text x="680" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">0.2341</text>
<rect x="20" y="590" width="740" height="96" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="603" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Artifact Storage</text>
<rect x="36" y="608" width="220" height="68" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" opacity="1"/>
<text x="146" y="623" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a148c">MLflow  (experiment tracking)</text>
<text x="146" y="638" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">log_params(hyperparams)</text>
<text x="146" y="650" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">log_metrics(auc, f1, ...)</text>
<text x="146" y="662" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">log_model(model, registered_name)</text>
<rect x="272" y="608" width="472" height="68" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="508" y="623" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">GCS  gs://kkbox-churn-prediction-493716-data/models/kkbox-churn-xgboost/</text>
<text x="400" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">model.ubj</text>
<text x="508" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">preprocessing_config.json</text>
<text x="640" y="638" text-anchor="middle" font-size="10" font-weight="bold" fill="#111111">feature_cols.json</text>
<text x="400" y="652" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">XGBoost binary</text>
<text x="508" y="652" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">medians · modes · gender_map</text>
<text x="640" y="652" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">18 feature names ordered</text>
<text x="400" y="664" text-anchor="middle" font-size="9" font-weight="normal" fill="#777777" font-family="Courier New, Courier, monospace">saved via tempfile upload</text>
<text x="508" y="664" text-anchor="middle" font-size="9" font-weight="normal" fill="#777777">cold-start imputation values</text>
<text x="640" y="664" text-anchor="middle" font-size="9" font-weight="normal" fill="#777777">Feast + model must agree</text>
