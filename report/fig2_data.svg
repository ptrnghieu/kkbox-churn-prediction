<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" font-family="Arial, Helvetica, sans-serif" style="background:#fff">
<defs>
  <marker id="arr" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#2a2a2a"/>
  </marker>
  <marker id="arr-lt" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#888888"/>
  </marker>
  <marker id="arr-blue" markerWidth="9" markerHeight="7"
          refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#1565c0"/>
  </marker>
</defs><text x="400" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#111111">Data Pipeline — Detailed Architecture</text>
<text x="400" y="42" text-anchor="middle" font-size="10" font-weight="normal" fill="#555555">Historical Playback Streaming: GCS Bronze → Kafka → Feature Store</text>
<rect x="20" y="52" width="760" height="60" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="65" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">GCS Bronze Layer</text>
<rect x="36" y="68" width="194" height="36" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="133" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">user_logs_v2.csv</text>
<text x="133" y="94" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">1.3 GB  ·  2017 daily listening logs</text>
<rect x="246" y="68" width="194" height="36" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="343" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">transactions_v2.csv</text>
<text x="343" y="94" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">110 MB  ·  2017 subscription transactions</text>
<rect x="456" y="68" width="300" height="36" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="606" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">features_train  (BigQuery Gold)</text>
<text x="606" y="94" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">~1M rows  ·  snapshot ≤ 2016-12-31  ·  baseline</text>
<rect x="20" y="130" width="380" height="220" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="143" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">kafka_producer.py</text>
<rect x="36" y="146" width="348" height="48" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="210" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">① Pre-load Transactions</text>
<text x="210" y="175" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">pd.read_csv(GCS_URL, chunksize=50k)  →  txns_by_date dict</text>
<text x="210" y="187" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">~25 MB in-memory  ·  only 2017 rows kept</text>
<rect x="36" y="204" width="348" height="48" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="210" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">② Stream user_logs in 200k-row Chunks</text>
<text x="210" y="231" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">gcsfs  →  no local disk write  ·  dtype=int32/float32</text>
<text x="210" y="243" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">groupby date  →  accumulate ul_parts[d]</text>
<rect x="36" y="262" width="348" height="56" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="210" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">③ Per-day Send</text>
<text x="210" y="291" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">send user_logs → TOPIC_USER_LOGS</text>
<text x="210" y="303" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">send transactions → TOPIC_TRANSACTIONS</text>
<text x="210" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">flush()  →  EOD marker on BOTH topics</text>
<rect x="36" y="328" width="348" height="14" rx="5" fill="#e8e8e8" stroke="#888888" stroke-width="1.5" opacity="1"/>
<text x="210" y="338" text-anchor="middle" font-size="9" font-weight="normal" fill="#777777">sleep(speed)  ·  default 55 s/day</text>
<rect x="420" y="130" width="360" height="90" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="428" y="143" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">EOD Marker (Dual-Topic)</text>
<rect x="436" y="148" width="328" height="64" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" opacity="1"/>
<text x="600" y="163" text-anchor="middle" font-size="9" font-weight="normal" fill="#333" font-family="Courier New, Courier, monospace">eod = {"_end_of_day": True, "date": d}</text>
<text x="600" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#bf360c" font-family="Courier New, Courier, monospace">send(TOPIC_USER_LOGS,    "__eod__", eod)</text>
<text x="600" y="191" text-anchor="middle" font-size="9" font-weight="bold" fill="#bf360c" font-family="Courier New, Courier, monospace">send(TOPIC_TRANSACTIONS, "__eod__", eod)</text>
<text x="600" y="205" text-anchor="middle" font-size="9" font-weight="normal" fill="#555" font-family="Courier New, Courier, monospace">producer.flush()      # guarantees delivery</text>
<rect x="20" y="368" width="760" height="68" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="381" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Kafka Topics  (KRaft Mode — No ZooKeeper)</text>
<rect x="36" y="384" width="348" height="44" rx="5" fill="#e8f4f8" stroke="#1565c0" stroke-width="2" opacity="1"/>
<text x="210" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">kkbox.user_logs</text>
<text x="210" y="415" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">key = msno  ·  daily listening activity rows</text>
<rect x="400" y="384" width="364" height="44" rx="5" fill="#e8f4f8" stroke="#1565c0" stroke-width="2" opacity="1"/>
<text x="582" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">kkbox.transactions</text>
<text x="582" y="415" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">key = msno  ·  subscription transaction rows  +  EOD</text>
<rect x="20" y="454" width="760" height="336" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="467" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">kafka_consumer.py</text>
<rect x="36" y="470" width="220" height="44" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="146" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">① Lock Kafka Offset</text>
<text x="146" y="498" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">auto_offset_reset=latest</text>
<text x="146" y="509" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">consumer.poll(10s)  →  offset committed</text>
<rect x="272" y="470" width="220" height="44" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="382" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">② Load Baseline  (20s delay)</text>
<text x="382" y="498" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">BQ features_train → members dict</text>
<text x="382" y="509" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">~1M msno  ·  16 numeric features each</text>
<rect x="508" y="470" width="256" height="44" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="636" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">③ Consume Loop</text>
<text x="636" y="498" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">for msg in consumer:</text>
<text x="636" y="509" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">buffer by (topic, date, msno)</text>
<rect x="36" y="534" width="460" height="64" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" opacity="1"/>
<text x="266" y="548" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">④ Dual EOD Tracking</text>
<text x="266" y="562" text-anchor="middle" font-size="9" font-weight="normal" fill="#555" font-family="Courier New, Courier, monospace">eod_logs.add(date)  /  eod_txns.add(date)</text>
<text x="266" y="574" text-anchor="middle" font-size="9" font-weight="normal" fill="#555" font-family="Courier New, Courier, monospace">if date in eod_logs AND date in eod_txns:</text>
<text x="266" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828" font-family="Courier New, Courier, monospace">    flush(date)       # prevents partial flush</text>
<rect x="36" y="618" width="460" height="68" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" opacity="1"/>
<text x="266" y="632" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">⑤ Cumulative Feature Aggregation</text>
<text x="266" y="647" text-anchor="middle" font-size="10" font-weight="normal" fill="#2e7d32" font-family="Courier New, Courier, monospace">x_t(u) = x_0(u)  +  Σ Δx_d(u),  d=1..t</text>
<text x="266" y="661" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">baseline (BQ features_train)  +  streaming delta</text>
<text x="266" y="673" text-anchor="middle" font-size="9" font-weight="normal" fill="#555" font-family="Courier New, Courier, monospace">members.update(updates)   # immediate, before BQ</text>
<rect x="36" y="696" width="222" height="80" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="147" y="711" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">⑥ flush(date)</text>
<text x="147" y="726" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0" font-family="Courier New, Courier, monospace">POST /stream/notify</text>
<text x="147" y="738" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">(non-blocking, before I/O)</text>
<text x="147" y="752" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">build_rows() → rows, updates</text>
<text x="147" y="764" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">bg_queue.put((date, rows))</text>
<rect x="274" y="696" width="222" height="80" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" opacity="1"/>
<text x="385" y="711" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a148c">⑦ Background Thread</text>
<text x="385" y="726" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">write_to_bq(rows)  ~30-60s</text>
<text x="385" y="738" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">feast.materialize(date)</text>
<text x="385" y="752" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">bg_queue.task_done()</text>
<text x="385" y="764" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">bg_queue.join()  # clean shutdown</text>
<rect x="512" y="696" width="248" height="80" rx="5" fill="#f2f2f2" stroke="#2a2a2a" stroke-width="1.5" opacity="1"/>
<text x="636" y="711" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Auto Cleanup on /stream/start</text>
<text x="636" y="726" text-anchor="middle" font-size="9" font-weight="normal" fill="#333" font-family="Courier New, Courier, monospace">pkill -f kafka_producer.py</text>
<text x="636" y="738" text-anchor="middle" font-size="9" font-weight="normal" fill="#333" font-family="Courier New, Courier, monospace">pkill -f kafka_consumer.py</text>
<text x="636" y="752" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555" font-family="Courier New, Courier, monospace">kills tracked PIDs (SIGTERM)</text>
<text x="636" y="764" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">Ensures clean start each time</text>
<rect x="20" y="808" width="760" height="68" rx="8" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="6,3"/>
<text x="28" y="821" font-size="10" font-weight="bold" fill="#777777" text-transform="uppercase">Output — Feature Store</text>
<rect x="36" y="824" width="320" height="44" rx="5" fill="#fff8e1" stroke="#c8a200" stroke-width="1.5" opacity="1"/>
<text x="196" y="839" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">BigQuery  kkbox_gold.features_streaming</text>
<text x="196" y="852" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">append-only  ·  partitioned by event_timestamp</text>
<rect x="372" y="824" width="392" height="44" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" opacity="1"/>
<text x="568" y="839" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">Redis  (Cloud Memorystore 10.80.68.19:6379)</text>
<text x="568" y="852" text-anchor="middle" font-size="9" font-weight="normal" fill="#555555">latest cumulative features per msno  ·  Feast online store</text>
<line x1="133" y1="104" x2="133" y2="146" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="343" y1="104" x2="343" y2="204" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="210" y1="342" x2="210" y2="384" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="582" y1="220" x2="582" y2="384" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="210" y1="428" x2="210" y2="454" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="582" y1="428" x2="582" y2="454" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="146" y1="514" x2="146" y2="534" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="382" y1="514" x2="266" y2="534" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="636" y1="514" x2="460" y2="560" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="266" y1="598" x2="266" y2="618" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="266" y1="686" x2="147" y2="696" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="266" y1="686" x2="385" y2="696" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="147" y1="776" x2="196" y2="824" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="385" y1="776" x2="568" y2="824" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M 606, 104 L 636, 470" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-lt)"/>
<text x="640" y="290" text-anchor="middle" font-size="9" fill="#555555" style="font-style:italic">baseline load</text>
<path d="M 180, 726 L 790, 726 L 790, 888 L 764, 846" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
<text x="793" y="800" text-anchor="middle" font-size="9" fill="#1565c0" style="font-style:italic">POST /notify</text>
</svg>
