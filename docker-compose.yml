version: "3.8"
services:

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Retain messages for 1 hour max, or 2 GB per topic — whichever comes first.
      # Each simulation replay writes ~1.5 GB; without these limits Kafka fills
      # the disk across repeated runs (default retention is 7 days / unlimited).
      KAFKA_LOG_RETENTION_MS: 3600000
      KAFKA_LOG_RETENTION_BYTES: 2147483648
      KAFKA_LOG_SEGMENT_BYTES: 536870912
    networks:
      - churn-network

  redis:
    image: redis:7.2-alpine
    restart: always
    ports: ["6379:6379"]
    networks:
      - churn-network

  feast:
    build: ./feature_store
    restart: always
    depends_on: [redis, kafka]
    env_file: ./.env
    volumes:
      - ./feature_store/feature_store.yaml:/app/feature_store.yaml
      - ~/.config/gcloud/application_default_credentials.json:/tmp/gcp_credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_credentials.json
      GOOGLE_CLOUD_PROJECT: kkbox-churn-prediction-493716
    networks:
      - churn-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_ALLOW_UNTRUSTED_HOST=true
    volumes:
      - ./artifacts:/mlflow/artifacts
      - ./mlflow.db:/mlflow/mlflow.db
    networks:
      - churn-network
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  api_serving:
    build: ./serving_pipeline
    depends_on: [feast, mlflow]
    env_file: ./.env
    environment:
      FEAST_REPO_PATH: /app/feature_store
    ports: ["8000:8000"]
    volumes:
      - ./feature_store:/app/feature_store
    networks:
      - churn-network
    profiles: ["docker-only"]

networks:
  churn-network:
    driver: bridge